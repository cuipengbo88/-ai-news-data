name: Daily AI News Fetch

on:
  schedule:
    - cron: '57 15 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright anthropic
          python -m playwright install chromium --with-deps

      - name: Fetch AI news
        run: python fetch.py

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_report.py

      - name: Commit raw data and report
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@ai-news.local"
          git add raw/ reports/
          git diff --cached --quiet || git commit -m "$(date +%Y-%m-%d) fetch+report"
          git push
