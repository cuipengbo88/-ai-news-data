name: Daily AI News Fetch

on:
  schedule:
    - cron: '0 14 * * *'  # 22:00 CST (UTC+8)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright anthropic openai
          python -m playwright install chromium --with-deps

      - name: Fetch AI news
        run: python fetch.py

      - name: Check API key
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -c "
          import os
          key = os.environ.get('DEEPSEEK_API_KEY', '')
          if not key:
              print('ERROR: DEEPSEEK_API_KEY secret is empty or not set!')
              exit(1)
          print(f'Secret length: {len(key)} chars, prefix: {key[:5]}...')
          from openai import OpenAI
          client = OpenAI(api_key=key, base_url='https://api.deepseek.com/v1')
          try:
              r = client.models.list()
              print('API connection OK, models accessible')
          except Exception as e:
              print(f'API test failed: {e}')
              exit(1)
          "

      - name: Generate report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python generate_report.py

      - name: Commit raw data and report
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@ai-news.local"
          git add raw/ reports/
          git diff --cached --quiet || git commit -m "$(date +%Y-%m-%d) fetch+report"
          git push
